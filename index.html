<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lumen — Launch</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <h1>Lumen</h1>
    <p class="tag">AI-powered automation, built for speed to revenue.</p>

    <section class="card">
      <h2>We’re validating demand</h2>
      <p>Get early access and we’ll reach out with the first pilot.
      </p>
      <form action="https://formspree.io/f/your-form-id" method="POST" class="form">
        <input type="email" name="email" placeholder="you@company.com" required />
        <input type="text" name="use_case" placeholder="Biggest task you’d automate first" />
        <button type="submit">Request Early Access</button>
      </form>
      <small class="note">No spam. We’ll only email when we ship.</small>
    </section>

    <footer>
      <small>© <span id="year"></span> Lumen. All rights reserved.</small>
    </footer>
  </main>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
